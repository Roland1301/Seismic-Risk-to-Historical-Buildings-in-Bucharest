<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Interactive Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.css" />
  <style>
    body { margin:0; padding:0; }
    #map { width:100vw; height:100vh; }
    .info { padding:6px 8px; background:white; box-shadow:0 0 15px rgba(0,0,0,0.2); border-radius:5px; }
    .legend i { width:18px; height:18px; float:left; margin-right:8px; opacity:0.7; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.js"></script>
  <script src="https://unpkg.com/leaflet-search@4.0.0/dist/leaflet-search.min.js"></script>

  <script>
    /* ============================================
       EDIT THIS ARRAY – list your .geojson files
       ============================================ */
    const myLayers = [
      "affected_roads.geojson",
      "buffer.geojson",
      "city_bound.geojson",
      "districts.geojson",
      "monument_buildings.geojson",
      "old_town_bound.geojson",
      "risk_index.geojson",
      "seismic_risk_buildings.geojson",
      "study_area.geojson"
      // add more files here, for example:
      // "rivers.geojson",
      // "points_of_interest.geojson"
    ];

    /* ============================================
       Do NOT modify below unless you know JS
       ============================================ */
    const palette = ["#e6194b","#3cb44b","#ffe119","#4363d8","#f58231","#911eb4","#42d4f4","#f032e6","#bfef45","#fabebe","#469990","#e6beff","#9a6324","#800000","#aaffc3","#808000","#ffd8b1","#000075","#a9a9a9"];
    let colorIdx = 0;
    function getColor() { return palette[colorIdx++ % palette.length]; }

    function guessName(filename) {
      return filename.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }

    function buildPopup(feature) {
      let html = '<table style="max-width:250px;">';
      for (let key in feature.properties) {
        html += `<tr><td><strong>${key}</strong></td><td>${feature.properties[key]}</td></tr>`;
      }
      html += '</table>';
      return html;
    }

    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap, &copy; CARTO',
      maxZoom: 19
    }).addTo(map);

    const overlayLayers = {};
    const legendDiv = document.createElement('div');
    legendDiv.className = 'info legend';
    legendDiv.innerHTML = '<strong>Legend</strong><br>';
    let allBounds = L.latLngBounds();

    async function loadAllLayers() {
      for (const file of myLayers) {
        const name = guessName(file);
        const color = getColor();
        try {
          const response = await fetch(file);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const geojson = await response.json();

          const layer = L.geoJSON(geojson, {
            style: (feature) => {
              if (feature.geometry.type === 'Point' || feature.geometry.type === 'MultiPoint') return {};
              return { color: color, weight: 2, opacity: 0.8, fillOpacity: 0.5, fillColor: color };
            },
            pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
              radius: 7,
              fillColor: color,
              color: "#333",
              weight: 1,
              opacity: 1,
              fillOpacity: 0.8
            }),
            onEachFeature: (feature, layer) => layer.bindPopup(buildPopup(feature))
          }).addTo(map);

          overlayLayers[name] = layer;
          if (layer.getBounds().isValid()) allBounds.extend(layer.getBounds());
          legendDiv.innerHTML += `<i style="background:${color}"></i> ${name}<br>`;
          console.log(`✅ Loaded: ${name}`);
        } catch (err) {
          console.warn(`⚠️ Could not load ${file}: ${err.message}`);
        }
      }

      if (allBounds.isValid()) map.fitBounds(allBounds);
      if (Object.keys(overlayLayers).length > 0) L.control.layers(null, overlayLayers).addTo(map);

      // Measure tool
      L.control.measure({ position: 'topright', primaryLengthUnit: 'kilometers', secondaryLengthUnit: 'miles' }).addTo(map);

      // Legend
      const legendCtrl = L.control({ position: 'bottomright' });
      legendCtrl.onAdd = () => legendDiv;
      legendCtrl.addTo(map);

      // Download links
      const dlCtrl = L.control({ position: 'bottomleft' });
      dlCtrl.onAdd = function() {
        const div = L.DomUtil.create('div', 'info');
        div.innerHTML = '<strong>📥 Download</strong><br>';
        myLayers.forEach(f => {
          div.innerHTML += `<a href="${f}" download>${guessName(f)}</a><br>`;
        });
        return div;
      };
      dlCtrl.addTo(map);

      // Optional: add a search for the first layer (or remove this block)
      if (myLayers.length > 0 && overlayLayers[guessName(myLayers[0])]) {
        // Search on the first layer – you can change this to search all layers if needed
        const firstLayer = overlayLayers[guessName(myLayers[0])];
        map.addControl(new L.Control.Search({
          layer: firstLayer,
          propertyName: 'name',   // change to a field in your first layer
          marker: false,
          moveToLocation: (latlng) => map.setView(latlng, 17),
          textPlaceholder: `Search ${guessName(myLayers[0])}...`
        }));
      }
    }

    loadAllLayers();
  </script>
</body>
</html>
