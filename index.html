<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Map from layers.json</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.css" />
  <style>
    body { margin:0; padding:0; }
    #map { width:100vw; height:100vh; }
    .info { padding:6px 8px; background:white; box-shadow:0 0 15px rgba(0,0,0,0.2); border-radius:5px; }
    .legend i { width:18px; height:18px; float:left; margin-right:8px; opacity:0.7; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.js"></script>
  <script src="https://unpkg.com/leaflet-search@4.0.0/dist/leaflet-search.min.js"></script>

  <script>
    // --- Configuration ---
    const MANIFEST_FILE = 'layers.json';

    // Colour palette for automatic layer styling
    const palette = ["#e6194b","#3cb44b","#ffe119","#4363d8","#f58231","#911eb4","#42d4f4","#f032e6","#bfef45","#fabebe","#469990","#e6beff","#9a6324","#800000","#aaffc3","#808000","#ffd8b1","#000075","#a9a9a9"];
    let colorIdx = 0;
    function getColor() { return palette[colorIdx++ % palette.length]; }

    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap, &copy; CARTO',
      maxZoom: 19
    }).addTo(map);

    const overlayLayers = {};
    const legendDiv = document.createElement('div');
    legendDiv.className = 'info legend';
    legendDiv.innerHTML = '<strong>Legend</strong><br>';
    let allBounds = L.latLngBounds();

    function guessName(filename) {
      return filename.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    }

    function buildPopup(feature) {
      let html = '<table style="max-width:250px;">';
      for (let key in feature.properties) {
        html += `<tr><td><strong>${key}</strong></td><td>${feature.properties[key]}</td></tr>`;
      }
      html += '</table>';
      return html;
    }

    async function loadLayersFromManifest() {
      let layersList;
      try {
        const resp = await fetch(MANIFEST_FILE);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        layersList = await resp.json();
        if (!Array.isArray(layersList)) throw new Error('Invalid JSON (must be array)');
      } catch (err) {
        alert(`❌ Could not load ${MANIFEST_FILE}. Create it with at least [{"file":"yourdata.geojson"}].\n\nError: ${err.message}`);
        console.error(err);
        return;
      }

      for (const layerDef of layersList) {
        const file = layerDef.file;
        const name = layerDef.name || guessName(file);
        const searchField = layerDef.searchField || null;

        // Merge default style with user overrides
        const userStyle = layerDef.style || {};
        const userPointStyle = layerDef.pointStyle || userStyle;
        const color = userStyle.fillColor || userStyle.color || userPointStyle.fillColor || userPointStyle.color || getColor();

        const baseStyle = {
          color: color,
          weight: 2,
          opacity: 0.8,
          fillOpacity: 0.5,
          ...userStyle,
          fillColor: userStyle.fillColor || color,
          color: userStyle.color || color
        };
        const pointStyle = {
          radius: 7,
          fillColor: color,
          color: "#333",
          weight: 1,
          opacity: 1,
          fillOpacity: 0.8,
          ...userPointStyle,
          fillColor: userPointStyle.fillColor || color,
          color: userPointStyle.color || "#333"
        };

        try {
          const dataResp = await fetch(file);
          if (!dataResp.ok) throw new Error(`HTTP ${dataResp.status}`);
          const geojson = await dataResp.json();

          const leafletLayer = L.geoJSON(geojson, {
            style: (feature) => {
              if (feature.geometry.type === 'Point' || feature.geometry.type === 'MultiPoint') return {};
              return baseStyle;
            },
            pointToLayer: (feature, latlng) => L.circleMarker(latlng, pointStyle),
            onEachFeature: (feature, layer) => layer.bindPopup(buildPopup(feature))
          }).addTo(map);

          overlayLayers[name] = leafletLayer;
          if (leafletLayer.getBounds().isValid()) allBounds.extend(leafletLayer.getBounds());

          legendDiv.innerHTML += `<i style="background:${pointStyle.fillColor || baseStyle.fillColor}"></i> ${name}<br>`;

          if (searchField) {
            map.addControl(new L.Control.Search({
              layer: leafletLayer,
              propertyName: searchField,
              marker: false,
              moveToLocation: (latlng) => map.setView(latlng, 17),
              textPlaceholder: `Search ${name}...`
            }));
          }
          console.log(`✅ Loaded: ${name}`);
        } catch (e) {
          console.warn(`⚠️ Skipping ${file}: ${e.message}`);
        }
      }

      if (allBounds.isValid()) map.fitBounds(allBounds);
      if (Object.keys(overlayLayers).length > 0) L.control.layers(null, overlayLayers).addTo(map);

      L.control.measure({
        position: 'topright',
        primaryLengthUnit: 'kilometers',
        secondaryLengthUnit: 'miles'
      }).addTo(map);

      const legendCtrl = L.control({ position: 'bottomright' });
      legendCtrl.onAdd = () => legendDiv;
      legendCtrl.addTo(map);

      // Download links
      const dlCtrl = L.control({ position: 'bottomleft' });
      dlCtrl.onAdd = function() {
        const div = L.DomUtil.create('div', 'info');
        div.innerHTML = '<strong>📥 Download</strong><br>';
        layersList.forEach(l => {
          div.innerHTML += `<a href="${l.file}" download>${l.name || guessName(l.file)}</a><br>`;
        });
        return div;
      };
      dlCtrl.addTo(map);
    }

    loadLayersFromManifest();
  </script>
</body>
</html>
